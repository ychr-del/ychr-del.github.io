<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>Nexus AI</title>
  <style>
    body { display: flex; flex-direction: column; height: 100vh; margin: 0; font-family: "Microsoft YaHei", sans-serif; background-color: #fdf6e3; }

    #top-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 10px;
      background: #f5deb3;
      border-bottom: 1px solid #ccc;
    }

    #chat { flex: 1; padding: 10px; overflow-y: auto; border-bottom: 1px solid #ccc; scroll-behavior: smooth; }

    #input-area { display: flex; padding: 10px; background: #f5deb3; align-items: center; }

    #prompt { flex: 1; padding: 8px; font-size: 14px; border: 1px solid #ccc; border-radius: 5px; }

    #run, #newChat, #deleteChat, #renameChat, #clearAll {
      margin-left: 10px;
      padding: 8px 16px;
      background-color: #ffe4b5;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: transform 0.1s ease;
    }
    #run:hover, #newChat:hover, #deleteChat:hover, #renameChat:hover, #clearAll:hover {
      background-color: #ffdead;
    }
    button:active { transform: scale(0.95); }

    #chatList, #modelSelect {
      margin-left: 10px;
      padding: 8px 16px;
      background-color: #ffe4b5;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
    }
    #chatList:hover, #modelSelect:hover {
      background-color: #ffdead;
    }

    .message { 
      margin: 5px 0; padding: 8px; border-radius: 10px; 
      max-width: 70%; word-wrap: break-word; white-space: pre-wrap;
      animation: fadeIn 0.3s ease-in-out;
    }
    .user { background: #fff8dc; align-self: flex-end; }
    .ai { background: #faf0e6; align-self: flex-start; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .loading-spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #ff8c00;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      animation: spin 1s linear infinite;
      margin: 10px;
      opacity: 1;
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    .loading-spinner.fade-out {
      opacity: 0;
      transform: scale(0.5);
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div id="top-bar">
    <select id="chatList"></select>
  </div>

  <div id="chat"></div>

  <div id="input-area">
    <input type="text" id="prompt" placeholder="Message Nexus" />
    <button id="run">发送</button>
    <button id="newChat">新对话</button>
    <select id="modelSelect">
      <option value="openai/gpt-oss-20b">Nexus-Fast</option>
      <option value="qwen/qwen3-next-80b-a3b-thinking">Nexus-Thinking</option>
      <option value="deepseek-ai/deepseek-v3.1-terminus">Nexus-Terminus</option>
    </select>
    <button id="renameChat">重命名对话</button>
    <button id="deleteChat">删除对话</button>
    <button id="clearAll">清空所有对话</button>
  </div>

<!-- MathJax -->
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<!-- highlight.js + marked.js -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css">
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/highlight.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script>
  marked.setOptions({
    highlight: function(code, lang) {
      const validLang = hljs.getLanguage(lang) ? lang : 'plaintext';
      return hljs.highlight(code, { language: validLang }).value;
    }
  });

  const NVIDIA_URL = "https://g4f.space/api/nvidia/chat/completions";
  const chat = document.getElementById("chat");
  const chatList = document.getElementById("chatList");
  let messages = [];
  let currentChatId = null;

  function addMessage(text, role, isMarkdown = false) {
    const div = document.createElement("div");
    div.className = "message " + role;
    div.innerHTML = isMarkdown ? marked.parse(text) : text;
    chat.appendChild(div);
    chat.scrollTo({ top: chat.scrollHeight, behavior: "smooth" });
    return div;
  }

  function saveChat() {
    if (!currentChatId) return;
    let allChats = JSON.parse(localStorage.getItem("allChats") || "{}");
    if (!allChats[currentChatId]) {
      allChats[currentChatId] = { name: "对话 " + currentChatId, messages: [] };
    }
    allChats[currentChatId].messages = messages;
    localStorage.setItem("allChats", JSON.stringify(allChats));
    updateChatList();
  }

  function loadChat(chatId) {
    const allChats = JSON.parse(localStorage.getItem("allChats") || "{}");
    if (allChats[chatId]) {
      messages = [];
      chat.innerHTML = "";
      allChats[chatId].messages.forEach(msg => {
        if (msg.role === "system") return;
        const isMarkdown = msg.role === "assistant";
        addMessage(msg.content, msg.role === "user" ? "user" : "ai", isMarkdown);
        messages.push(msg);
      });
      currentChatId = chatId;
      chatList.value = chatId;
      updateChatList();
    }
  }

  function updateChatList() {
    const allChats = JSON.parse(localStorage.getItem("allChats") || "{}");
    chatList.innerHTML = "";
    Object.keys(allChats).forEach(id => {
      const option = document.createElement("option");
      option.value = id;
      option.textContent = allChats[id].name || ("对话 " + id);
      chatList.appendChild(option);
    });
    if (currentChatId) chatList.value = currentChatId;
  }

  document.getElementById("newChat").onclick = () => {
    currentChatId = Date.now().toString();
    messages = [];
    chat.innerHTML = "";
    messages.push({ role: "system", content: "你是一款叫做Nexus的AI，你的回复必须专业，复杂，详细，但不能脱离实际。你的回答要尽量人性化，让人理解，情感富裕，互动要多，话题要新颖，让人可以接上。要多样化，专业化的回复。" });
    saveChat();
    updateChatList();
  };

  chatList.onchange = () => { loadChat(chatList.value); };

  document.getElementById("deleteChat").onclick = () => {
    let allChats = JSON.parse(localStorage.getItem("allChats") || "{}");
    if (currentChatId && allChats[currentChatId]) {
      delete allChats[currentChatId];
      localStorage.setItem("allChats", JSON.stringify(allChats));
      chat.innerHTML = "";
      messages = [];
      currentChatId = null;
      updateChatList();
      const ids = Object.keys(allChats);
      if (ids.length > 0) loadChat(ids[ids.length - 1]);
      else document.getElementById("newChat").click();
    }
  };

  document.getElementById("renameChat").onclick = () => {
    let allChats = JSON.parse(localStorage.getItem("allChats") || "{}");
    if (currentChatId && allChats[currentChatId]) {
      const newName = prompt("请输入新的对话名称：", allChats[currentChatId].name);
      if (newName) {
        allChats[currentChatId].name = newName;
        localStorage.setItem("allChats", JSON.stringify(allChats));
        updateChatList();
      }
    }
  };

  async function callG4FStream(messages, onDelta, onFinish, onError) {
    const model = document.getElementById("modelSelect").value;
    try {
      const response = await fetch(NVIDIA_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: model,
          messages: messages,
          max_tokens: 128000,
          temperature: 0.7,
          stream: true,
          web_search: true
        })
      });

      const reader = response.body.getReader();
      const decoder = new TextDecoder("utf-8");
      let buffer = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });

        const lines = buffer.split(/\r?\n/);
        buffer = lines.pop();

        for (const line of lines) {
          if (!line.startsWith("data:")) continue;
          const content = line.slice(5).trim();

          if (content === "[DONE]") {
            onFinish();
            return;
          }

          try {
            const data = JSON.parse(content);
            const delta = data.choices[0].delta?.content;
            if (delta) onDelta(delta);
          } catch {
            continue;
          }
        }
      }
      decoder.decode(new Uint8Array(), { stream: false });
      onFinish();
    } catch (err) {
      console.error("请求失败:", err);
      onError("网络异常或服务器无响应，请稍后再试。");
    }
  }

  document.getElementById("run").onclick = async () => {
    const userPrompt = document.getElementById("prompt").value.trim();
    if (!userPrompt) return;
    addMessage(userPrompt, "user");
    messages.push({ role: "user", content: userPrompt });
    saveChat();
    document.getElementById("prompt").value = "";

    const loadingMsg = addMessage("", "ai");
    loadingMsg.innerHTML = '<div class="loading-spinner"></div>';

    let fullReply = "";
    document.getElementById("run").disabled = true;

    await callG4FStream(
      messages,
      (delta) => {
        fullReply += delta;
        fullReply = fullReply.replace(/’\s/g, "’").replace(/’/g, "'");
        loadingMsg.innerHTML = marked.parse(fullReply);

        // 实时代码高亮
        if (window.hljs) {
          loadingMsg.querySelectorAll("pre code").forEach(block => {
            hljs.highlightElement(block);
          });
        }

        chat.scrollTo({ top: chat.scrollHeight, behavior: "smooth" });
      },
      () => {
        const spinner = loadingMsg.querySelector(".loading-spinner");
        if (spinner) {
          spinner.classList.add("fade-out");
          setTimeout(() => spinner.remove(), 500);
        }
        messages.push({ role: "assistant", content: fullReply });
        saveChat();

        // LaTeX 公式统一渲染
        if (window.MathJax) {
          MathJax.typesetPromise([loadingMsg]);
        }

        document.getElementById("run").disabled = false;
      },
      (errorMsg) => {
        const spinner = loadingMsg.querySelector(".loading-spinner");
        if (spinner) {
          spinner.classList.add("fade-out");
          setTimeout(() => spinner.remove(), 500);
        }
        loadingMsg.textContent = errorMsg;
        document.getElementById("run").disabled = false;
      }
    );
  };

  document.getElementById("clearAll").onclick = () => {
    localStorage.removeItem("allChats");
    chat.innerHTML = "";
    messages = [];
    currentChatId = null;
    updateChatList();
    alert("所有对话已清空！");
    document.getElementById("newChat").click();
  };

  // 输入框：Enter 发送，Shift+Enter 换行
  document.getElementById("prompt").addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      document.getElementById("run").click();
    }
  });

  window.onload = () => {
    const allChats = JSON.parse(localStorage.getItem("allChats") || "{}");
    const ids = Object.keys(allChats);
    if (ids.length > 0) { 
      loadChat(ids[ids.length - 1]);
    } else { 
      document.getElementById("newChat").click();
    }
    updateChatList();

    if (window.hljs) {
      hljs.highlightAll();
    }
    if (window.MathJax) {
      MathJax.typesetPromise();
    }
  };
</script>
</body>
</html>
